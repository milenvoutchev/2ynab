# 2ynab configuration file
# Project-specific import format configurations
# These override/extend the bank2ynab.conf configurations

[DE Deutsche Bank Credit Card]
# Overrides: Header Rows = 5 (vs base 4), Footer Rows = 2 (vs base 1) for project-specific CSV format
Header Rows = 5
Footer Rows = 2

[DE Deutsche Bank]
# Extends base bank2ynab.conf config to support both Transactions and Kontoumsaetze filename patterns
# Overrides: Source Filename Pattern (supports both patterns), Header Rows = 5
Source Filename Pattern = (Transactions|Kontoumsaetze)_\d{3}_\d{9}_\d{8}_\d{6}
Header Rows = 5

[DE Deutsche Kreditbank checking]
# DKB Girokonto legacy format (10-digit account number)
# Overrides: Source Filename Pattern (explicit regex with .csv extension)
Source Filename Pattern = ^[0-9]{10}\.csv$

[ePay microaccount]
# Bulgarian ePay format
Use Regex For Filename = True
Source Filename Pattern = epay_(microaccount|movements)_\d{4}-\d{2}-\d{2}_\d{2}-\d{2}-\d{2}
Source CSV Delimiter = ,
Header Rows = 1
Date Column = dateTime
Date Format = %d.%m.%Y %H:%M:%S
Payee Column = recipient
Memo Column = comment
Amount BGN Column = outBGN,inBGN
Input Columns = dateTime,account,inBGN,outBGN,recipient,systemCode,comment,longDescription
